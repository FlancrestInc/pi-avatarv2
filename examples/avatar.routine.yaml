avatar:
  state_file: state/state.json
  asset_dir: assets
  default_state: idle
  states: [booting, idle, thinking, working, success, error, offline]

source:
  type: none

mode:
  type: routine
  strategy: weighted_random
  steps:
    - state: idle
      duration_seconds: 8
      weight: 5
    - state: thinking
      duration_seconds: 4
      weight: 2
    - state: success
      duration_seconds: 2
      weight: 1
