avatar:
  state_file: state/state.json
  asset_dir: assets
  default_state: idle
  states: [booting, idle, thinking, working, success, error, offline]

display:
  pi_enabled: true
  width: 800
  height: 480
  fullscreen: true
  framebuffer: /dev/fb0
  background_color: "#000000"
  show_detail: true
  scale_mode: contain

source:
  type: none

mode:
  type: routine
  strategy: weighted_random
  steps:
    - state: idle
      duration_seconds: 8
      weight: 5
    - state: thinking
      duration_seconds: 4
      weight: 2
    - state: success
      duration_seconds: 2
      weight: 1
